<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="On plonge dans le détail de la liste" />
    <meta name="author" content="Algomius" />
    <link rel="stylesheet" href="./style/normalize.css" />
    <link rel="stylesheet" href="./style/index.css" />
    <title>Détail d'une liste</title>
  </head>
  <body>
    <header id="entete"></header>

    <main>
      <h1 id="titreH1">Détail d'une liste</h1>
      <section id="tache">
        <form id="formTache">
          <table>
            <tr>
              <td><label for="titre">Titre&nbsp;:</label></td>
              <td>
                <input type="text" id="titre" name="tache_titre" required />
              </td>
            </tr>
            <tr>
              <td><label for="description">Description&nbsp;:</label></td>
              <td>
                <input
                  type="text"
                  id="description"
                  name="tache_description"
                  required
                />
              </td>
            </tr>
            <tr>
              <td><label for="etat">Etat&nbsp;:</label></td>
              <td>
                <select id="etat" name="tache_etat" required>
                  <option value="">--Veuillez choisir un état--</option>
                  <option value="A faire">A Faire</option>
                  <option value="En cours">En Cours</option>
                  <option value="Terminée">Terminée</option>
                </select>
              </td>
            </tr>
            <tr>
              <td><label for="date_echeance">Date d'échéance&nbsp;:</label></td>
              <td>
                <input
                  type="date"
                  id="date_echeance"
                  name="tache_date_echeance"
                  required
                />
              </td>
            </tr>
          </table>

          <!-- Ajout des boutons indispensables à l'expérience utilisateur -->
          <div id="actions">
            <button type="submit" id="btnValider">Enregistrer</button>
            <a href="index.html" id="btnAnnuler" class="btn-annuler">Annuler</a>
          </div>
        </form>
      </section>
    </main>

    <footer id="pied"></footer>
  </body>
  <script type="module" src="./js/detail.js"></script>
</html>
